<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roles de Limpieza - Residencia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 🎨 BASE REFINADA ESTILO SLATE */
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: #f8fafc !important; /* Gris limpio de interfaz moderna */
            color: #334155;
        }

        /* Cambiamos el negro tosco por un azul pizarra oscuro sofisticado */
        .bg-dark, .offcanvas, .hero-section {
            background-color: #0f172a !important; 
        }

        /* Contenedores planos: sin sombras exageradas ni bordes redondeados infantiles */
        .card {
            background: #ffffff;
            border: 1px solid #e2e8f0 !important;
            border-radius: 6px !important;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05) !important;
        }
        
        /* Alertas limpias y planas */
        .alert {
            border-radius: 6px !important;
            border: 1px solid rgba(0,0,0,0.05);
            font-size: 0.875rem;
            font-weight: 500;
        }
    </style>
</head>
<body class="bg-light">

    <div class="container mt-3">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <div class="container-fluid p-0">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
