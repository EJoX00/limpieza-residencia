<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roles de Limpieza - Residencia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'cartelera_publica' %}">🧼 Sistema de Limpieza</a>
            <div>
                <a href="{% url 'cartelera_publica' %}" class="btn btn-outline-light btn-sm">Ver Cartelera Pública</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'panel_control' %}" class="btn btn-success btn-sm ms-2">Mi Panel de Área</a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm ms-2">Ingresar</a>
                    <a href="{% url 'registro_admin' %}" class="btn btn-primary btn-sm ms-2">Registro Admin</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
