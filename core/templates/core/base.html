<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roles de Limpieza - Residencia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 🏛️ ESTILO EDITORIAL UNIVERSITARIO (CON CARÁCTER Y VIVO) */
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            background-color: #f1f5f9 !important; /* Gris con más cuerpo */
            color: #0f172a;
        }

        /* Contenedores con bordes sólidos y definidos: se ve estructurado y real, no IA */
        .card {
            background: #ffffff;
            border: 2px solid #0f172a !important; /* Estructura fuerte */
            border-radius: 8px !important;
            box-shadow: 4px 4px 0px 0px #0f172a !important; /* Sombra sólida con carácter */
            overflow: hidden;
        }
        
        .card-header {
            background-color: #0f172a !important;
            border-bottom: 2px solid #0f172a !important;
            color: #ffffff !important;
            font-weight: 700;
            padding: 14px 16px;
            letter-spacing: 0.02em;
        }

        /* Alertas institucionales con presencia */
        .alert {
            border-radius: 6px !important;
            border: 2px solid #0f172a;
            font-weight: 600;
            box-shadow: 3px 3px 0px 0px #0f172a;
        }
    </style>
</head>
<body class="bg-light">

    <div class="container mt-3">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    </div>

    <div class="container-fluid p-0">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
